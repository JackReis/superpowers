name: Repo Health

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Basic structure checks
        run: |
          test -f CLAUDE.md || (echo "Missing CLAUDE.md" && exit 1)
          test -d .claude || (echo "Missing .claude directory" && exit 1)
          test -f .claude/settings.json || (echo "Missing .claude/settings.json" && exit 1)

      - name: Optional Node checks
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          npm ci || npm install
          npm run lint --if-present
          npm test --if-present
          npm run build --if-present

      - name: Optional Python checks
        if: ${{ hashFiles('pyproject.toml') != '' || hashFiles('requirements.txt') != '' }}
        run: |
          python3 -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi
          pytest -q || true
